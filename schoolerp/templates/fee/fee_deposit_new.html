{% extends 'base_layout.html' %}

{% block content %}

<style>
.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #e0e0e0;
}

.page-header h2 {
    margin: 0;
    color: #333;
    font-size: 26px;
    font-weight: 600;
}

.btn-primary {
    background: #b80b36;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s;
}

.btn-primary:hover {
    background: #9a0a2d;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(184, 11, 54, 0.3);
}

.search-container {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

.search-tabs {
    display: flex;
    margin-bottom: 20px;
    border-bottom: 1px solid #e0e0e0;
}

.tab-btn {
    padding: 10px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-weight: 600;
    color: #666;
    border-bottom: 2px solid transparent;
    transition: all 0.3s;
}

.tab-btn.active {
    color: #b80b36;
    border-bottom-color: #b80b36;
}

.search-form {
    display: none;
}

.search-form.active {
    display: block;
}

.form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
    font-size: 14px;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #b80b36;
    box-shadow: 0 0 0 3px rgba(184, 11, 54, 0.1);
}

.btn-search {
    background: #2196F3;
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
}

.btn-search:hover {
    background: #1976D2;
    transform: translateY(-1px);
}

.student-results {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 30px;
    display: none;
}

.student-card {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.3s;
}

.student-card:hover {
    border-color: #b80b36;
    background: #FFF5F5;
}

.student-card.selected {
    border-color: #b80b36;
    background: #FFF5F5;
    box-shadow: 0 2px 8px rgba(184, 11, 54, 0.2);
}

.student-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.student-details {
    flex: 1;
}

.student-name {
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
}

.student-meta {
    color: #666;
    font-size: 13px;
}

.fee-calculation {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 30px;
    display: none;
}

.fee-breakdown {
    margin-bottom: 20px;
}

.fee-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
}

.fee-item:last-child {
    border-bottom: none;
    font-weight: 600;
    color: #333;
}

.fee-label {
    color: #666;
}

.fee-amount {
    color: #333;
    font-weight: 600;
}

.total-fee {
    background: #E8F5E9;
    color: #2E7D32;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-size: 18px;
    font-weight: 700;
    margin: 20px 0;
}

.deposit-form {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    display: none;
}

.deposit-form .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.btn-submit {
    background: #b80b36;
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
}

.btn-submit:hover {
    background: #9a0a2d;
    transform: translateY(-1px);
}

.btn-cancel {
    background: #f0f0f0;
    color: #333;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.2s;
}

.btn-cancel:hover {
    background: #e0e0e0;
}

.alert {
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 20px;
}

.alert.success {
    background: #E8F5E9;
    color: #2E7D32;
    border: 1px solid #81C784;
}

.alert.error {
    background: #FFEBEE;
    color: #C62828;
    border: 1px solid #EF5350;
}

.loading {
    text-align: center;
    padding: 20px;
    color: #666;
}

.spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #b80b36;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    display: inline-block;
    margin-right: 10px;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>

<div class="page-header">
    <div>
        <h2>💳 Fee Deposit</h2>
        <p style="color: #666; margin: 5px 0 0 0;">Search student and collect fee payments</p>
    </div>
</div>

<!-- Search Container -->
<div class="search-container">
    <div class="search-tabs">
        <button class="tab-btn active" data-tab="admission" onclick="switchTab('admission')">Search by Admission No.</button>
        <button class="tab-btn" data-tab="class" onclick="switchTab('class')">Search by Class & Section</button>
    </div>

    <!-- Admission Number Search -->
    <div id="admissionForm" class="search-form active">
        <div class="form-group">
            <label for="admissionNo">Admission Number *</label>
            <input type="text" id="admissionNo" placeholder="Enter admission number">
        </div>
        <button class="btn-search" onclick="searchByAdmission()">Search Student</button>
    </div>

    <!-- Class & Section Search -->
    <div id="classForm" class="search-form">
        <div class="form-row">
            <div class="form-group">
                <label for="className">Class *</label>
                <select id="className">
                    <option value="">-- Select Class --</option>
                    {% for class_obj in classes %}
                    <option value="{{ class_obj.name }}">{{ class_obj.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="section">Section</label>
                <select id="section">
                    <option value="">-- All Sections --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>
            </div>
        </div>
        <button class="btn-search" onclick="searchByClass()">Search Students</button>
    </div>
</div>

<!-- Student Results -->
<div id="studentResults" class="student-results">
    <h3>Select Student</h3>
    <div id="studentList"></div>
</div>

<!-- Fee Calculation -->
<div id="feeCalculation" class="fee-calculation">
    <h3>Fee Breakdown</h3>
    <div id="feeBreakdown"></div>
    <div id="totalFee" class="total-fee"></div>
    <button class="btn-primary" onclick="proceedToDeposit()">Proceed to Deposit</button>
</div>

<!-- Deposit Form -->
<div id="depositForm" class="deposit-form">
    <h3>Complete Fee Deposit</h3>
    <div id="alertBox"></div>

    <form id="paymentForm">
        {% csrf_token %}
        <input type="hidden" id="selectedStudentId" name="student_id">
        <input type="hidden" id="totalFeeAmount" name="total_fee">

        <div class="form-row">
            <div class="form-group">
                <label for="paymentMode">Payment Mode *</label>
                <select id="paymentMode" name="payment_mode" required>
                    <option value="">-- Select Payment Mode --</option>
                    <option value="cash">Cash</option>
                    <option value="cheque">Cheque</option>
                    <option value="online">Online Transfer</option>
                    <option value="card">Card</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="paidAmount">Paid Amount (₹) *</label>
                <input type="number" id="paidAmount" name="paid_amount" step="0.01" min="0" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="paymentDate">Payment Date *</label>
                <input type="date" id="paymentDate" name="payment_date" required>
            </div>
            <div class="form-group">
                <label for="reference">Reference/Receipt No.</label>
                <input type="text" id="reference" name="reference_no" placeholder="Check/Reference number">
            </div>
        </div>

        <div class="form-group">
            <label for="remarks">Remarks</label>
            <textarea id="remarks" name="remarks" placeholder="Additional notes..." style="width: 100%; padding: 10px 12px; border: 2px solid #ddd; border-radius: 8px; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
        </div>

        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button type="button" class="btn-cancel" onclick="backToCalculation()">Back</button>
            <button type="submit" class="btn-submit">Submit Deposit</button>
        </div>
    </form>
</div>

<script>
let selectedStudent = null;
let feeData = null;

// Tab switching
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.search-form').forEach(form => form.classList.remove('active'));

    document.querySelector('button[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById(tab + 'Form').classList.add('active');

    // reset any previous search state when switching tabs
    document.getElementById('admissionNo').value = '';
    document.getElementById('className').value = '';
    document.getElementById('section').value = '';
    document.getElementById('studentList').innerHTML = '';
    document.getElementById('studentResults').style.display = 'none';
    document.getElementById('feeCalculation').style.display = 'none';
    document.getElementById('depositForm').style.display = 'none';
    document.getElementById('feeBreakdown').innerHTML = '';
    document.getElementById('totalFee').innerHTML = '';
    selectedStudent = null;
    feeData = null;
}

// Search functions
function searchByAdmission() {
    const admissionNo = document.getElementById('admissionNo').value.trim();
    if (!admissionNo) {
        alert('Please enter admission number');
        return;
    }

    searchStudents('admission_no', admissionNo);
}

function searchByClass() {
    const className = document.getElementById('className').value;
    const section = document.getElementById('section').value;

    if (!className) {
        alert('Please select a class');
        return;
    }

    searchStudents('class_section', '', className, section);
}

function searchStudents(searchType, query = '', className = '', section = '') {
    const params = new URLSearchParams({
        search_type: searchType,
        query: query,
        class_name: className,
        section: section
    });

    document.getElementById('studentList').innerHTML = '<div class="loading"><div class="spinner"></div>Searching...</div>';
    document.getElementById('studentResults').style.display = 'block';

    fetch(`/fee/api/search-students/?${params}`)
        .then(response => response.json())
        .then(data => {
            displayStudents(data.students);
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('studentList').innerHTML = '<p>Error searching students</p>';
        });
}

function displayStudents(students) {
    const studentList = document.getElementById('studentList');

    if (students.length === 0) {
        studentList.innerHTML = '<p>No students found</p>';
        return;
    }

    let html = '';
    students.forEach(student => {
        const transportInfo = student.transport_route ?
            `<br><small style="color: #666;">Transport: ${student.transport_route.route_name} (₹${student.transport_route.fare_amount})</small>` : '';

        html += `
            <div class="student-card" onclick="selectStudent(this, ${student.id}, '${student.name.replace(/'/g, "\\'")}', '${(student.admission_number || '').replace(/'/g, "\\'")}')">
                <div class="student-info">
                    <div class="student-details">
                        <div class="student-name">${student.name}</div>
                        <div class="student-meta">
                            Admission: ${student.admission_number || 'N/A'} | 
                            Class: ${student.student_class} ${student.section} | 
                            Roll: ${student.roll_no}
                            ${transportInfo}
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    studentList.innerHTML = html;
}

function selectStudent(cardElement, studentId, studentName, admissionNumber) {
    document.querySelectorAll('.student-card').forEach(card => card.classList.remove('selected'));
    cardElement.classList.add('selected');

    selectedStudent = {id: studentId, name: studentName, admission_number: admissionNumber};

    // Show loading in fee calculation area
    document.getElementById('feeCalculation').style.display = 'block';
    document.getElementById('depositForm').style.display = 'none';
    document.getElementById('feeBreakdown').innerHTML = '<div class="loading"><div class="spinner"></div>Calculating fees...</div>';
    document.getElementById('totalFee').innerHTML = '';

    fetch(`/fee/api/calculate-student-fees/?student_id=${encodeURIComponent(studentId)}`)
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                displayFeeBreakdown(data);
                feeData = data;
                // Automatically proceed to deposit form after fee calculation
                setTimeout(() => {
                    proceedToDeposit();
                }, 500); // Small delay for better UX
            } else {
                document.getElementById('feeBreakdown').innerHTML = `<p style="color: red;">${data.error}</p>`;
                document.getElementById('totalFee').innerHTML = '';
                feeData = null;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('feeBreakdown').innerHTML = '<p>Error calculating fees</p>';
            document.getElementById('totalFee').innerHTML = '';
            feeData = null;
        });
}

function displayFeeBreakdown(data) {
    let html = '';

    data.fee_breakdown.forEach(item => {
        const discountText = item.discount_amount > 0 ? ` (-₹${item.discount_amount})` : '';
        html += `
            <div class="fee-item">
                <span class="fee-label">${item.particular_name}${discountText}</span>
                <span class="fee-amount">₹${item.final_amount}</span>
            </div>
        `;
    });

    document.getElementById('feeBreakdown').innerHTML = html;
    document.getElementById('totalFee').innerHTML = `Total Fee: ₹${data.total_fee}`;
}

function proceedToDeposit() {
    if (!feeData) {
        alert('Please select a student first');
        return;
    }

    document.getElementById('selectedStudentId').value = feeData.student.id;
    document.getElementById('totalFeeAmount').value = feeData.total_fee;
    document.getElementById('paymentDate').valueAsDate = new Date();

    // Auto-fill paid amount with total fee
    document.getElementById('paidAmount').value = feeData.total_fee;

    document.getElementById('feeCalculation').style.display = 'none';
    document.getElementById('depositForm').style.display = 'block';
}

function backToCalculation() {
    document.getElementById('depositForm').style.display = 'none';
    document.getElementById('feeCalculation').style.display = 'block';
}

// Form submission
document.getElementById('paymentForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const paidAmount = parseFloat(formData.get('paid_amount'));
    const totalFee = parseFloat(feeData.total_fee);

    if (paidAmount > totalFee) {
        showAlert('Paid amount cannot exceed total fee amount!', 'error');
        return;
    }

    formData.append('student_id', feeData.student.id);
    formData.append('total_fee', totalFee);

    fetch('/fee/deposit/save/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name="csrfmiddlewaretoken"]').value
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showAlert('Fee deposit saved successfully!', 'success');
            setTimeout(() => {
                // Reset the form and hide sections
                document.getElementById('paymentForm').reset();
                document.getElementById('depositForm').style.display = 'none';
                document.getElementById('feeCalculation').style.display = 'none';
                document.getElementById('studentResults').style.display = 'none';
                selectedStudent = null;
                feeData = null;

                // Remove selection
                document.querySelectorAll('.student-card').forEach(card => card.classList.remove('selected'));
            }, 1000);
        } else {
            showAlert(data.error, 'error');
        }
    })
    .catch(error => {
        showAlert('Error: ' + error, 'error');
    });
});

function showAlert(message, type) {
    const alertBox = document.getElementById('alertBox');
    const alert = document.createElement('div');
    alert.className = `alert ${type}`;
    alert.innerText = message;
    alertBox.innerHTML = '';
    alertBox.appendChild(alert);

    setTimeout(() => {
        alert.remove();
    }, 4000);
}
</script>

{% endblock %}
