{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3 class="mb-4">Add Vehicle</h3>

<form method="post">
{% csrf_token %}

<div class="row">

<div class="col-md-4">
<label class="form-label">Vehicle Name</label>
<input type="text" class="form-control" name="vehicle_name">
</div>

<div class="col-md-4">
<label class="form-label">Vehicle Number</label>
<input type="text" class="form-control" name="reg_number">
</div>

<div class="col-md-4">
<label class="form-label">Seats</label>
<input type="number" class="form-control" name="seats">
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label class="form-label">Driver Name</label>
<input type="text" class="form-control" name="driver_name">
</div>

<div class="col-md-6">
<label class="form-label">Driver Mobile</label>
<input type="text" class="form-control" name="driver_mobile">
</div>

</div>

<br>

<button class="btn btn-primary">Save Vehicle</button>

</form>

<hr>

<h4 class="mt-4">Vehicle List</h4>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Vehicle</th>
<th>Number</th>
<th>Driver</th>
<th>Mobile</th>
<th>Seats</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for v in vehicles %}

<tr>
<td>{{ v.vehicle_name }}</td>
<td>{{ v.reg_number }}</td>
<td>{{ v.driver_name }}</td>
<td>{{ v.driver_mobile }}</td>
<td>{{ v.seats }}</td>

<td>

<a href="/edit-vehicle/{{v.id}}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="/delete-vehicle/{{v.id}}" class="btn btn-danger btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>
</div>

{% endblock %}
