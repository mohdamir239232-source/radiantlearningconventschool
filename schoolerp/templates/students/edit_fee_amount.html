{% extends 'base.html' %}

{% block content %}

<h3>Edit Fee Structure</h3>

<form method="post">

{% csrf_token %}

<table class="table table-bordered">

<tr>
<th>Particular</th>
<th>Fee Mode</th>
<th>Amount</th>
</tr>

{% for p in particulars %}

<tr>

<td>{{p.name}}</td>
<td>{{p.fee_mode}}</td>

<td>

<input type="number"
name="amount_{{p.id}}"
class="form-control"
value="{% for a in data %}{% if a.particular.id == p.id %}{{ a.amount }}{% endif %}{% endfor %}">

</td>

</tr>

{% endfor %}

</table>

<button class="btn btn-success">Update Fee</button>

</form>

{% endblock %}
