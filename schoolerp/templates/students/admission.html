{% extends 'base_layout.html' %}

{% block content %}

<style>
.form-container {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-width: 900px;
    margin: 0 auto;
}

.form-header {
    margin-bottom: 30px;
    border-bottom: 2px solid #e0e0e0;
    padding-bottom: 20px;
}

.form-header h2 {
    margin: 0;
    color: #333;
    font-size: 24px;
    font-weight: 600;
}

.form-section {
    margin-bottom: 30px;
}

.form-section h3 {
    color: #b80b36;
    font-size: 16px;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
}

.form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
    font-size: 14px;
}

.form-group input,
.form-group select,
.form-group textarea {
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #b80b36;
    box-shadow: 0 0 0 3px rgba(184, 11, 54, 0.1);
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

.form-actions {
    display: flex;
    gap: 15px;
    margin-top: 30px;
    justify-content: flex-end;
}

.btn {
    padding: 10px 25px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
}

.btn-primary {
    background: #b80b36;
    color: white;
}

.btn-primary:hover {
    background: #9a0a2d;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(184, 11, 54, 0.3);
}

.btn-secondary {
    background: #f0f0f0;
    color: #333;
}

.btn-secondary:hover {
    background: #e0e0e0;
}

.required::after {
    content: ' *';
    color: #F44336;
}
</style>

<div class="form-container">
    <div class="form-header">
        <h2>🎓 Student Admission Form</h2>
        <p style="color: #666; margin: 10px 0 0 0;">Register a new student in the school</p>
    </div>

    <form method="POST" action="/">
        {% csrf_token %}

        <!-- Personal Information -->
        <div class="form-section">
            <h3>Personal Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name" class="required">First Name</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>
                <div class="form-group">
                    <label for="last_name" class="required">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>
                <div class="form-group">
                    <label for="dob" class="required">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="gender" class="required">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                        <option value="O">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
            </div>
        </div>

        <!-- Academic Information -->
        <div class="form-section">
            <h3>Academic Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="class" class="required">Class</label>
                    <select id="class" name="class" required>
                        <option value="">Select Class</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                        <option value="11">Class 11</option>
                        <option value="12">Class 12</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="section" class="required">Section</label>
                    <select id="section" name="section" required>
                        <option value="">Select Section</option>
                        <option value="A">Section A</option>
                        <option value="B">Section B</option>
                        <option value="C">Section C</option>
                        <option value="D">Section D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="session" class="required">Academic Session</label>
                    <select id="session" name="session" required>
                        <option value="">Select Session</option>
                        <option value="2024-2025">2024-2025</option>
                        <option value="2025-2026">2025-2026</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Parent Information -->
        <div class="form-section">
            <h3>Parent/Guardian Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="parent_name" class="required">Parent Name</label>
                    <input type="text" id="parent_name" name="parent_name" required>
                </div>
                <div class="form-group">
                    <label for="parent_phone" class="required">Parent Phone</label>
                    <input type="tel" id="parent_phone" name="parent_phone" required>
                </div>
                <div class="form-group">
                    <label for="parent_email">Parent Email</label>
                    <input type="email" id="parent_email" name="parent_email">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="address" class="required">Address</label>
                    <textarea id="address" name="address" required></textarea>
                </div>
                <div class="form-group">
                    <label for="city" class="required">City</label>
                    <input type="text" id="city" name="city" required>
                </div>
                <div class="form-group">
                    <label for="state" class="required">State</label>
                    <input type="text" id="state" name="state" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="postal_code" class="required">Postal Code</label>
                    <input type="text" id="postal_code" name="postal_code" required>
                </div>
                <div class="form-group">
                    <label for="occupation">Occupation</label>
                    <input type="text" id="occupation" name="occupation">
                </div>
            </div>
        </div>

        <!-- Additional Information -->
        <div class="form-section">
            <h3>Additional Information</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="previous_school">Previous School</label>
                    <input type="text" id="previous_school" name="previous_school">
                </div>
                <div class="form-group">
                    <label for="transport">Transport Required</label>
                    <select id="transport" name="transport">
                        <option value="N">No</option>
                        <option value="Y">Yes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="remarks">Remarks</label>
                    <textarea id="remarks" name="remarks"></textarea>
                </div>
            </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button type="reset" class="btn btn-secondary">Clear Form</button>
            <button type="submit" class="btn btn-primary">Submit Admission</button>
        </div>
    </form>
</div>

{% endblock %}
