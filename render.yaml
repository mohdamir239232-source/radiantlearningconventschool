services:
  - type: web
    name: schoolerp-rlcs
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python schoolerp/manage.py collectstatic --noinput
      python schoolerp/manage.py migrate
    startCommand: gunicorn --chdir schoolerp schoolerp.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ALLOWED_HOSTS
        value: schoolerp-rlcs.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://schoolerp-rlcs.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: schoolerp-rlcs-db
          property: connectionString

databases:
  - name: schoolerp-rlcs-db
    plan: free
